{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container" style="max-width: 500px; margin: 80px auto; padding: 0 20px; margin-bottom: 120px;">
    
    <div data-aos="zoom-in" style="background: #fffcfd; padding: 40px; border-radius: 20px; box-shadow: 0 8px 30px rgba(216, 138, 154, 0.1); border: 1px solid #fce4ec; text-align: center;">
        
        <div style="width: 80px; height: 80px; background: #fff0f3; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;">
            <i class="fa-solid fa-circle-check fa-3x" style="color: #d88a9a;"></i>
        </div>

        <h2 style="color: #4a4a4a; margin-top: 0; margin-bottom: 15px; font-family: 'Playfair Display', serif; font-size: 2.2em; font-weight: bold;">
            Đổi Mật Khẩu Thành Công!
        </h2>
        
        <p style="color: #666; font-family: 'Quicksand', sans-serif; margin-bottom: 30px; font-size: 1.05em; line-height: 1.6;">
            Tuyệt vời! Mật khẩu của bạn đã được cập nhật an toàn. Bây giờ bạn có thể đăng nhập bằng mật khẩu mới để tiếp tục hành trình tìm kiếm chiếc váy trong mơ rồi đó.
        </p>
        
        <a href="{% url 'login' %}" class="btn-filled" style="display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; border: none; padding: 16px; border-radius: 30px; font-size: 1.1em; letter-spacing: 1px; cursor: pointer; text-decoration: none; box-sizing: border-box;">
            <i class="fa-solid fa-right-to-bracket"></i> ĐĂNG NHẬP NGAY
        </a>
        
    </div>
    
</div>
{% endblock %}
