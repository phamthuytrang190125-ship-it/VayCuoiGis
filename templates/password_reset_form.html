{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    .form-input {
        width: 100%;
        padding: 14px 20px;
        border: 2px solid #fce4ec;
        border-radius: 12px;
        margin-bottom: 25px;
        box-sizing: border-box;
        font-family: 'Quicksand', sans-serif;
        font-size: 15px;
        outline: none;
        transition: all 0.3s ease;
        background: white;
        text-align: center; /* Canh giữa chữ nhập vào cho sang */
    }
    .form-input:focus {
        border-color: #d88a9a;
        box-shadow: 0 0 8px rgba(216,138,154,0.2);
    }
</style>

<div class="container" style="max-width: 500px; margin: 80px auto; padding: 0 20px; margin-bottom: 120px;">
    
    <div data-aos="zoom-in" style="background: #fffcfd; padding: 40px; border-radius: 20px; box-shadow: 0 8px 30px rgba(216, 138, 154, 0.1); border: 1px solid #fce4ec; text-align: center;">
        
        <div style="width: 80px; height: 80px; background: #fff0f3; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;">
            <i class="fa-solid fa-unlock-keyhole fa-2x" style="color: #d88a9a;"></i>
        </div>

        <h2 style="color: #4a4a4a; margin-top: 0; margin-bottom: 15px; font-family: 'Playfair Display', serif; font-size: 2.2em; font-weight: bold;">
            Quên Mật Khẩu?
        </h2>
        
        <p style="color: #666; font-family: 'Quicksand', sans-serif; margin-bottom: 30px; font-size: 1.05em; line-height: 1.6;">
            Đừng lo lắng! Hãy nhập địa chỉ email bạn đã dùng để đăng ký, <strong style="color: #d88a9a;">Bridal Luxury</strong> sẽ gửi liên kết khôi phục tài khoản cho bạn ngay.
        </p>
        
        <form method="POST">
            {% csrf_token %}
            <input type="email" name="email" class="form-input" required placeholder="Nhập email của bạn vào đây...">
            
            <button type="submit" class="btn-filled" style="width: 100%; border: none; padding: 16px; border-radius: 30px; font-size: 1.1em; letter-spacing: 1px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;">
                <i class="fa-regular fa-paper-plane"></i> GỬI LINK KHÔI PHỤC
            </button>
        </form>

        <div style="margin-top: 25px; padding-top: 20px; border-top: 1px dashed #fce4ec;">
            <a href="{% url 'login' %}" style="color: #888; font-weight: 600; text-decoration: none; font-size: 0.95em; transition: 0.3s;" onmouseover="this.style.color='#d88a9a'" onmouseout="this.style.color='#888'">
                <i class="fa-solid fa-arrow-left"></i> Quay lại trang Đăng Nhập
            </a>
        </div>
    </div>
</div>
{% endblock %}
