{% extends 'base.html' %}

{% block content %}

<div class="container" style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
    
    <h2 style="text-align: center; font-family: 'Playfair Display', serif; color: #333; margin-bottom: 30px;">
        Hệ Thống Cửa Hàng
    </h2>
    
    <div style="height: 800px; overflow-y: auto; padding: 20px; border: 1px solid #eee; border-radius: 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.03);">

        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px;">
            {% for store in stores %}
            <div style="border: 1px solid #eee; border-radius: 15px; padding: 25px; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s;">
                
                <h3 style="margin-top: 0; color: #d88a9a;">{{ store.name }}</h3>
                
                <p><i class="fas fa-map-marker-alt"></i> {{ store.address }}</p>
                <p><i class="fas fa-phone"></i> {{ store.phone }}</p>
                
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <a href="{% url 'store_detail_view' store.id %}" style="flex: 1; text-align: center; background: #333; color: white; padding: 10px; border-radius: 20px; font-size: 14px; text-decoration: none;">
                        Xem Sản Phẩm
                    </a>
                    
                    <a href="{% url 'map_view' %}?focus_store={{ store.id }}" style="flex: 1; text-align: center; border: 1px solid #d88a9a; color: #d88a9a; padding: 10px; border-radius: 20px; font-size: 14px; text-decoration: none;">
                        Xem Bản Đồ
                    </a>
                </div>

            </div>
            {% endfor %}
        </div>

    </div>

</div>

{% endblock %}
