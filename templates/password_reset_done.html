{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container" style="max-width: 500px; margin: 80px auto; padding: 0 20px; margin-bottom: 120px;">
    
    <div data-aos="zoom-in" style="background: #fffcfd; padding: 40px; border-radius: 20px; box-shadow: 0 8px 30px rgba(216, 138, 154, 0.1); border: 1px solid #fce4ec; text-align: center;">
        
        <div style="width: 80px; height: 80px; background: #fff0f3; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;">
            <i class="fa-solid fa-envelope-open-text fa-2x" style="color: #d88a9a;"></i>
        </div>

        <h2 style="color: #4a4a4a; margin-top: 0; margin-bottom: 15px; font-family: 'Playfair Display', serif; font-size: 2.2em; font-weight: bold;">
            Đã Gửi Email!
        </h2>
        
        <p style="color: #666; font-family: 'Quicksand', sans-serif; margin-bottom: 10px; font-size: 1.1em; line-height: 1.6;">
            Chúng tôi vừa gửi một đường dẫn khôi phục mật khẩu đến email của bạn.
        </p>
        
        <p style="color: #888; font-family: 'Quicksand', sans-serif; margin-bottom: 30px; font-size: 0.95em; line-height: 1.6; font-style: italic;">
            Vui lòng kiểm tra hộp thư <strong style="color: #d88a9a;">(bao gồm cả thư mục Spam)</strong> và làm theo hướng dẫn để đặt lại mật khẩu nhé!
        </p>
        
        <a href="{% url 'login' %}" class="btn-filled" style="display: inline-flex; justify-content: center; align-items: center; gap: 8px; width: 100%; border: none; padding: 16px; border-radius: 30px; font-size: 1.05em; font-weight: bold; text-decoration: none; box-sizing: border-box; letter-spacing: 1px;">
            <i class="fa-solid fa-arrow-left"></i> QUAY LẠI ĐĂNG NHẬP
        </a>

    </div>
    
</div>
{% endblock %}
